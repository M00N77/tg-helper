services:
  assistant:
    build: .
    container_name: telegram-assistant
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Переменная DATABASE_URL берётся из .env файла
      TZ: UTC
    volumes:
      - ./data:/app/data
    # лог-ротация, чтобы не разрастался диск
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
